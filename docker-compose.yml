services:
  # 1. The Database (TimescaleDB)
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: tradeshift_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=tradeshift
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d tradeshift" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis Cache
  redis:
    image: redis:alpine
    container_name: tradeshift_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. MinIO (S3 compatible storage)
  minio:
    image: minio/minio
    container_name: tradeshift_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # 4. The Backend (FastAPI)
  backend:
    build: ./backend
    container_name: tradeshift_backend
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/tradeshift
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=market-data
      # AI & API Keys
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - FIN_GPT_URL=${FIN_GPT_URL}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      # Shoonya Credentials
      - SHOONYA_USER_ID=${SHOONYA_USER_ID}
      - SHOONYA_PASSWORD=${SHOONYA_PASSWORD}
      - SHOONYA_VENDOR_CODE=${SHOONYA_VENDOR_CODE}
      - SHOONYA_API_SECRET=${SHOONYA_API_SECRET}
      - SHOONYA_TOTP_SECRET=${SHOONYA_TOTP_SECRET}
      - SHOONYA_IMEI=${SHOONYA_IMEI}
      # Email
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_SERVER=${MAIL_SERVER}
      # Inngest
      - INNGEST_SIGNING_KEY=mock_key
      - INNGEST_DEV=1

  # 5. Message Queue
  rabbitmq:
    image: rabbitmq:3-management
    container_name: tradeshift_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # 6. The Frontend (Vite/React)
  frontend:
    build: ./frontend
    container_name: tradeshift_frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - CHOKIDAR_USEPOLLING=true

  # 7. News Worker
  worker:
    build: ./backend
    container_name: tradeshift_worker
    command: python workers/news_worker.py
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/tradeshift
      - PYTHONUNBUFFERED=1
      # Pass necessary API keys to worker too
      - NEWSDATA_API_KEY=${NEWSDATA_API_KEY}
      - NEWSAPI_KEY=${NEWSAPI_KEY}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - FIN_GPT_URL=${FIN_GPT_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./backend:/app

  # 8. AI ChatBot (FinGPT / RAG)
  chatbot:
    build: 
      context: ./backend/chatbot
      dockerfile: Dockerfile
    container_name: tradeshift_chatbot
    volumes:
      - ./backend/chatbot:/app
      - ./backend/chatbot/chroma_db:/app/chroma_db
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHATBOT_API_KEY=tradeshift-local-key
    restart: always

volumes:
  postgres_data:
  minio_data:
  rabbitmq_data:
  frontend_node_modules:
